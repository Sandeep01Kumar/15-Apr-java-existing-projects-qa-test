spring.application.name=spring-boot-simple-crud-with-mysql

server.port=8090

# Datasource (MySQL example - override for production)
spring.datasource.url=jdbc:mysql://localhost:3306/spring_boot_simple_crud?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=ZGV2LWp3dC1zZWNyZXQta2V5LXJlcGxhY2UtaW4tcHJvZHVjdGlvbi13aXRoLTI1NmJpdC1obWFjLXNoYS0yNTYta2V5
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer 

# Error handling: prevent information disclosure in error responses
# Per AAP section 0.7.1.4, the application MUST NOT leak stack traces, exception
# class names, framework-generated messages, or binding error detail in any
# error response. These properties harden Spring Boot's BasicErrorController
# (which handles the /error path that container-level error dispatches route
# to) by suppressing every potentially leaky field. The complementary Tomcat
# ErrorReportValve customizer in SpringBootSimpleCrudWithMysqlApplication
# disables the equivalent disclosure on Tomcat's own error pages (which are
# rendered when a request fails at the HTTP/1.1 parser level before Spring
# can dispatch to /error).
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

