spring.application.name=spring-boot-simple-crud-with-mysql

server.port=8090

# Datasource (MySQL example - override for production)
spring.datasource.url=jdbc:mysql://localhost:3306/spring_boot_simple_crud?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=ZGV2LWp3dC1zZWNyZXQta2V5LXJlcGxhY2UtaW4tcHJvZHVjdGlvbi13aXRoLTI1NmJpdC1obWFjLXNoYS0yNTYta2V5
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer 

# Error handling: prevent information disclosure in error responses
# Per AAP section 0.7.1.4, the application MUST NOT leak stack traces, exception
# class names, framework-generated messages, or binding error detail in any
# error response. These properties harden Spring Boot's BasicErrorController
# (which handles the /error path that container-level error dispatches route
# to) by suppressing every potentially leaky field. The complementary Tomcat
# ErrorReportValve customizer in SpringBootSimpleCrudWithMysqlApplication
# disables the equivalent disclosure on Tomcat's own error pages (which are
# rendered when a request fails at the HTTP/1.1 parser level before Spring
# can dispatch to /error).
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# Logging: prevent sensitive-data leakage from Spring Framework exception
# resolvers
# Per AAP section 0.7.1.4, the application MUST NOT permit user-entered
# passwords (or any other rejected validation values) to appear in log output
# at any level visible by default in production. Spring MVC's
# AbstractHandlerExceptionResolver.resolveException() emits a WARN-level log
# entry of the form "Resolved [<exception.toString()>]" whenever an
# @ExceptionHandler successfully resolves an exception. For a
# MethodArgumentNotValidException raised by a @Valid binding failure, the
# exception's toString() concatenates each FieldError's rejected value into
# the message - including the raw plaintext password the client submitted.
# This bypasses every application-level mitigation (Lombok @ToString.Exclude
# on DTO password fields, @JsonIgnore on UserDetailsImpl.password, and the
# sanitised @ExceptionHandler in GlobalExceptionHandler that logs only the
# field-error name/message map) because the framework logger runs in
# parallel with - not in place of - the application handler.
# Setting the resolver's logger to ERROR silences the leaky WARN line while
# preserving any genuine ERROR-level diagnostics from the same class. The
# application's own GlobalExceptionHandler.handleValidationExceptions
# continues to log a sanitised "Validation failed: {field=message}" map at
# ERROR for operator visibility, so the diagnostic surface for legitimate
# operability is unaffected.
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR

