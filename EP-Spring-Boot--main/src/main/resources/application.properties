spring.application.name=spring-boot-simple-crud-with-mysql

server.port=8090

# =============================================================================
# Datasource configuration
# -----------------------------------------------------------------------------
# Default: H2 in-memory database for local development and CI test runs.
# H2 is on the classpath (provided by the existing pom.xml) and lets Hibernate
# auto-create the product / users / roles / user_roles tables on startup.
#
# To run against MySQL (production), override the four spring.datasource.*
# properties below via environment variables, an external configuration file,
# or a profile-specific application-<profile>.properties. Example for MySQL:
#   spring.datasource.url=jdbc:mysql://localhost:3306/spring_boot_simple_crud?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#   spring.datasource.username=root
#   spring.datasource.password=
#   spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# =============================================================================
spring.datasource.url=jdbc:h2:mem:spring_boot_simple_crud;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# =============================================================================
# JWT (JSON Web Token) configuration
# -----------------------------------------------------------------------------
# jwt.secret  : Base64-encoded HMAC-SHA-256 key, MUST be at least 256 bits
#               (44 Base64 characters decoding to >= 32 bytes per RFC 7518).
#               The default below is a development placeholder; override in
#               production via the JWT_SECRET environment variable.
# jwt.expiration : Token lifetime in milliseconds (86400000 = 24 hours).
# jwt.header  : HTTP header where the token is supplied.
# jwt.prefix  : Bearer scheme prefix (note the trailing space).
# =============================================================================
jwt.secret=ZGV2LWp3dC1zZWNyZXQta2V5LXJlcGxhY2UtaW4tcHJvZHVjdGlvbi13aXRoLTI1NmJpdC1obWFjLXNoYS0yNTYta2V5
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer 
